name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Python syntax check
        run: |
          py_files=$(find . -type f -name "*.py")
          if [ -n "$py_files" ]; then
            python -m py_compile $py_files
          fi

      - name: Shell syntax check
        run: |
          sh_files=$(find . -type f -name "*.sh")
          if [ -n "$sh_files" ]; then
            for f in $sh_files; do bash -n "$f"; done
          fi

      - name: Repository hygiene check
        run: |
          bad=$(git ls-files | grep -E '(^|/)__pycache__/|\.pyc$|\.pyo$|\.DS_Store$|(^|/)\.venv/' || true)
          if [ -n "$bad" ]; then
            echo "Tracked junk files found:"
            echo "$bad"
            exit 1
          fi
